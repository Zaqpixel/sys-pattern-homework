---
- name: Install Apache web server
  ansible.builtin.apt:
    name: apache2
    state: present
    update_cache: yes

- name: Configure Apache ServerName
  ansible.builtin.template:
    src: servername.conf.j2
    dest: /etc/apache2/conf-available/servername.conf
    owner: root
    group: root
    mode: '0644'
  notify: restart apache

- name: Enable servername configuration
  ansible.builtin.command: a2enconf servername
  args:
    creates: /etc/apache2/conf-enabled/servername.conf
  notify: restart apache

- name: Deploy custom index.html from template
  ansible.builtin.template:
    src: index.html.j2
    dest: /var/www/html/index.html
    owner: root
    group: root
    mode: '0644'

- name: Open port 80 in UFW
  community.general.ufw:
    rule: allow
    port: '80'
    proto: tcp

- name: Start Apache service and enable at boot
  ansible.builtin.systemd:
    name: apache2
    state: started
    enabled: yes

- name: Verify web server is responding with 200
  ansible.builtin.uri:
    url: http://localhost
    status_code: 200
